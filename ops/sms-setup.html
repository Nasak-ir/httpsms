<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>نسک پیامک</title>
    <style>
      :root { color-scheme: light dark; font-family: Tahoma, Arial, sans-serif; background: #f8f5ed; color: #14211c; }
      * { box-sizing: border-box; }
      body { min-height: 100dvh; margin: 0; display: grid; place-items: center; padding: 24px; }
      main { width: min(100%, 440px); text-align: center; }
      .mark { width: 52px; height: 52px; margin: 0 auto 20px; display: grid; place-items: center; border: 1px solid #b9c5bd; border-radius: 8px; color: #08795a; font-size: 22px; font-weight: 700; }
      h1 { margin: 0 0 10px; font-size: 24px; letter-spacing: 0; }
      p { margin: 0; color: #52615a; line-height: 1.9; font-size: 14px; }
      .status { display: inline-flex; align-items: center; gap: 8px; margin-top: 22px; color: #08795a; font-size: 13px; }
      .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; animation: pulse 1.4s ease-in-out infinite; }
      @keyframes pulse { 50% { opacity: .25; transform: scale(.8); } }
      @media (prefers-color-scheme: dark) {
        :root { background: #0b1511; color: #ecf3ef; }
        p { color: #a7b6ae; }
        .mark { border-color: #31443a; }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">ن</div>
      <h1>نسک پیامک</h1>
      <p>پنل اختصاصی پیامک در حال تکمیل تنظیمات امن سرویس است.</p>
      <div class="status"><span class="dot"></span><span>راه‌اندازی زیرساخت</span></div>
    </main>
  </body>
</html>
