name: API CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: stable

      - name: Generate Firebase emulator credentials
        run: |
          bash tests/generate-firebase-credentials.sh tests/firebase-credentials.json
          echo "FIREBASE_CREDENTIALS=$(jq -c . tests/firebase-credentials.json)" >> "$GITHUB_ENV"

      - name: Start test services
        working-directory: ./tests
        run: docker compose up -d --build

      - name: Wait for services
        working-directory: ./tests
        run: |
          for i in $(seq 1 20); do
            if docker compose exec mongodb mongosh --eval "db.runCommand('ping').ok" --quiet >/dev/null 2>&1; then break; fi
            if [ "$i" -eq 20 ]; then docker compose logs mongodb; exit 1; fi
            sleep 3
          done
          for i in $(seq 1 40); do
            if docker compose exec api curl -sf http://localhost:8000/health >/dev/null 2>&1; then break; fi
            if [ "$i" -eq 40 ]; then docker compose logs api; exit 1; fi
            sleep 5
          done

      - name: Wait for seed
        working-directory: ./tests
        run: docker compose wait seed || true

      - name: Run handler integration tests
        working-directory: ./api
        env:
          USER_API_KEY: test-user-api-key
        run: go test -tags integration -v -timeout 60s ./pkg/handlers

      - name: Run integration tests
        working-directory: ./tests
        run: go test -v -timeout 300s ./...

      - name: Collect logs on failure
        if: failure()
        working-directory: ./tests
        run: docker compose logs --tail 200

      - name: Stop services
        if: always()
        working-directory: ./tests
        run: docker compose down -v
