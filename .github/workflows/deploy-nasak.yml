name: Deploy Nasak SMS

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "web/**"
      - "compose.production.yml"
      - "ops/**"
      - ".github/workflows/deploy-nasak.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nasak-sms-production
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ vars.NASAK_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Package immutable release
        env:
          RELEASE_ARCHIVE: ${{ runner.temp }}/nasak-sms-${{ github.sha }}.tar.gz
        run: |
          tar \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='node_modules' \
            --exclude='*.bundle' \
            --exclude='*-src.tar.gz' \
            -czf "$RELEASE_ARCHIVE" .
          (cd "$(dirname "$RELEASE_ARCHIVE")" && sha256sum "$(basename "$RELEASE_ARCHIVE")" > "$(basename "$RELEASE_ARCHIVE").sha256")

      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          install -d -m 0700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 0600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts
          printf 'Host production\n  HostName %s\n  User %s\n  IdentityFile ~/.ssh/id_ed25519\n  IdentitiesOnly yes\n' "$DEPLOY_HOST" "$DEPLOY_USER" > ~/.ssh/config

      - name: Upload verified release
        env:
          RELEASE_ARCHIVE: ${{ runner.temp }}/nasak-sms-${{ github.sha }}.tar.gz
        run: |
          scp "$RELEASE_ARCHIVE" production:/tmp/
          scp "$RELEASE_ARCHIVE.sha256" production:/tmp/

      - name: Deploy verified release
        run: |
          # shellcheck disable=SC2029
          ssh production "RELEASE_SHA=${GITHUB_SHA} bash -s" <<'REMOTE'
          set -Eeuo pipefail
          archive="/tmp/nasak-sms-${RELEASE_SHA}.tar.gz"
          checksum="${archive}.sha256"
          stage="/opt/nasak-sms/incoming/${RELEASE_SHA}"

          case "$stage" in
            /opt/nasak-sms/incoming/*) ;;
            *) echo "Unsafe release path" >&2; exit 1 ;;
          esac

          cd /tmp
          sha256sum --check "$checksum"
          sudo rm -rf -- "$stage"
          sudo install -d -m 0750 -o root -g root "$stage"
          sudo tar -xzf "$archive" -C "$stage"
          sudo rsync -a --delete --exclude='.git/' "$stage/" /opt/nasak-sms/repository/
          sudo env GIT_COMMIT="$RELEASE_SHA" /opt/nasak-sms/repository/ops/deploy.sh
          sudo rm -rf -- "$stage"
          rm -f -- "$archive" "$checksum"
          REMOTE

      - name: Smoke test
        run: |
          curl --fail --silent --show-error --retry 5 --retry-delay 3 https://sms.nasak.ir/healthz
          curl --fail --silent --show-error --retry 5 --retry-delay 3 https://sms.nasak.ir/api/health
