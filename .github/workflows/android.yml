name: Android CI

on:
  push:
    branches: [main]
    tags: ["sms-v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Android gateway
    runs-on: ubuntu-latest
    env:
      GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}
      RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
      RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
      RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
      RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@48b5f213c81028ace310571dc5ec0fbbca0b2947

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699

      - name: Install Android SDK platform
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Configure Firebase Android app
        working-directory: android
        run: |
          if [[ -n "$GOOGLE_SERVICES_JSON_BASE64" ]]; then
            printf '%s' "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > app/google-services.json
            jq --exit-status '
              .project_info.project_id == "nasak-21cb5" and
              any(.client[]; .client_info.android_client_info.package_name == "com.httpsms")
            ' app/google-services.json >/dev/null
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            cp app/google-services.example.json app/google-services.json
            jq --exit-status '
              any(.client[]; .client_info.android_client_info.package_name == "com.httpsms")
            ' app/google-services.json >/dev/null
          else
            echo "ANDROID_GOOGLE_SERVICES_JSON_BASE64 is required." >&2
            exit 1
          fi

          chmod 0600 app/google-services.json

      - name: Reject upstream telemetry and endpoints
        run: |
          if grep -R -E \
            'api\.httpsms\.com|api\.axiom\.co|ingest\.sentry\.io|xaat-' \
            android/app/src android/app/build.gradle.kts; then
            echo "The Android build still contains an upstream endpoint or credential." >&2
            exit 1
          fi

      - name: Configure release signing
        if: github.event_name != 'pull_request'
        run: |
          for value in \
            "$RELEASE_KEYSTORE_BASE64" \
            "$RELEASE_KEYSTORE_PASSWORD" \
            "$RELEASE_KEY_ALIAS" \
            "$RELEASE_KEY_PASSWORD"; do
            if [[ -z "$value" ]]; then
              echo "Android release signing secrets are incomplete." >&2
              exit 1
            fi
          done

          keystore="$RUNNER_TEMP/nasak-sms-release.p12"
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$keystore"
          chmod 0600 "$keystore"
          {
            echo "ANDROID_KEYSTORE_PATH=$keystore"
            echo "ANDROID_KEYSTORE_PASSWORD=$RELEASE_KEYSTORE_PASSWORD"
            echo "ANDROID_KEY_ALIAS=$RELEASE_KEY_ALIAS"
            echo "ANDROID_KEY_PASSWORD=$RELEASE_KEY_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Test and build debug APK
        if: github.event_name == 'pull_request'
        working-directory: android
        run: ./gradlew --no-daemon testDebugUnitTest assembleDebug

      - name: Test and build signed release APK
        if: github.event_name != 'pull_request'
        working-directory: android
        env:
          ANDROID_VERSION_CODE: ${{ github.run_number }}
          ANDROID_VERSION_NAME: ${{ startsWith(github.ref, 'refs/tags/sms-v') && github.ref_name || github.sha }}
        run: |
          ./gradlew --no-daemon testReleaseUnitTest assembleRelease
          "$ANDROID_HOME/build-tools/36.0.0/apksigner" verify --verbose app/build/outputs/apk/release/app-release.apk
          cp app/build/outputs/apk/release/app-release.apk ../NasakSms.apk

      - name: Upload signed APK
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: NasakSms-${{ github.run_number }}
          path: NasakSms.apk
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish Android release
    if: startsWith(github.ref, 'refs/tags/sms-v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download signed APK
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: NasakSms-*
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" NasakSms.apk \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$GITHUB_REF_NAME" NasakSms.apk \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --title "Nasak SMS ${GITHUB_REF_NAME#sms-v}" \
              --notes "Signed Nasak SMS Android gateway for sms.nasak.ir."
          fi
